<div class="related-posts">
  <h1>Related Posts</h1>
  <ul>
    {% for post in site.related_posts limit:3 %}
    <li>
      <h3>
        <a href="{{ site.baseurl }}{{ post.url }}">
          {{ post.title }}
          <small>{{ post.date | date: "%b %-d, %Y" }}</small>
        </a>
      </h3>
    </li>
    {% endfor %}
  </ul>
</div>
